<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-y: scroll; font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f8f9fa; color: #212529; line-height: 1.6; }

.container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

.card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card h2 { font-size: 1.15rem; margin-bottom: 16px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 8px; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-box { text-align: center; padding: 16px 8px; border-radius: 10px; }
.stat-box .num { font-size: 2rem; font-weight: 700; }
.stat-box .label { font-size: 0.78rem; color: #666; margin-top: 4px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
.badge-ok { background: #e8f5e9; color: #2e7d32; }
.badge-change { background: #fff3e0; color: #e65100; }
.sample-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.sample-table th { background: #f8f9fa; padding: 8px; text-align: left; border-bottom: 2px solid #dee2e6; position: sticky; top: 0; z-index: 1; }
.sample-table td { padding: 8px; border-bottom: 1px solid #eee; }
.sample-table tr:hover { background: #f8f9fa; }
.scroll-box { max-height: 500px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
.try-input { display: flex; gap: 8px; margin-bottom: 12px; }
.try-input input { flex: 1; padding: 10px 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; }
.try-input input:focus { border-color: #3498db; }
.try-input button { padding: 10px 20px; background: #3498db; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; }
.result-card { padding: 16px; border-radius: 8px; margin-top: 12px; font-size: 0.9rem; }
.result-card.unchanged { background: #e8f5e9; border-left: 4px solid #4caf50; }
.result-card.has_changes { background: #fff3e0; border-left: 4px solid #ff9800; }
.filter-btn { padding: 4px 10px; border: 2px solid; border-radius: 6px; background: #fff; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.15s; }
.filter-btn:hover { opacity: 0.8; }
.filter-btn.active { color: #fff !important; }
@media (max-width: 600px) { .stats-row { grid-template-columns: 1fr; } .scroll-box { overflow-x: auto; } .sample-table { min-width: 600px; } }
@media (max-width: 480px) { nav > div { gap: 8px !important; padding: 0 10px !important; } nav span:first-child { font-size: 0.82rem !important; } nav a { font-size: 0.78rem !important; padding: 3px 7px !important; } }

</head>

<nav style="background:#fff;border-bottom:1px solid #e0e0e0;padding:10px 0;position:sticky;top:0;z-index:100">
  <div style="max-width:960px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:16px">

    <a href="https://github.com/ronjuan83/ipc-search" target="_blank" rel="noreferrer" style="text-decoration:none;color:#999;font-size:0.8rem;margin-left:auto">GitHub</a>
  </div>
</nav>
<div class="container">
  <h1>IPC 三階重分類分析</h1>
  <p class="subtitle">判斷 IPC Class（三碼，如 H01、B23）是否有版本異動及涉及版本</p>

  <div class="card">
    <h2>總覽</h2>
    <div class="stats-row">
      <div class="stat-box" style="background:#e8eaf6"><div class="num" id="n-total">-</div><div class="label">IPC Class 總數</div></div>
      <div class="stat-box" style="background:#fff3e0"><div class="num" id="n-changed" style="color:#e65100">-</div><div class="label">有異動</div></div>
      <div class="stat-box" style="background:#e8f5e9"><div class="num" id="n-unchanged" style="color:#2e7d32">-</div><div class="label">無異動</div></div>
    </div>
  </div>

  <div class="card">
    <h2>即時查詢 — 輸入 IPC Class</h2>
    <div class="try-input">
      <input type="text" id="cls-input" placeholder="輸入三碼 class，如 H01、B23、G06" maxlength="3" />
      <button onclick="tryQuery()">查詢</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      <button onclick="tryEx('H01')" style="padding:3px 8px;border:1px solid #ddd;border-radius:4px;background:#f8f9fa;cursor:pointer;font-size:0.8rem">H01</button>
      <button onclick="tryEx('G06')" style="padding:3px 8px;border:1px solid #ddd;border-radius:4px;background:#f8f9fa;cursor:pointer;font-size:0.8rem">G06</button>
      <button onclick="tryEx('B23')" style="padding:3px 8px;border:1px solid #ddd;border-radius:4px;background:#f8f9fa;cursor:pointer;font-size:0.8rem">B23</button>
      <button onclick="tryEx('C13')" style="padding:3px 8px;border:1px solid #ddd;border-radius:4px;background:#f8f9fa;cursor:pointer;font-size:0.8rem">C13</button>
      <button onclick="tryEx('A22')" style="padding:3px 8px;border:1px solid #ddd;border-radius:4px;background:#f8f9fa;cursor:pointer;font-size:0.8rem">A22</button>
      <button onclick="tryEx('F24')" style="padding:3px 8px;border:1px solid #ddd;border-radius:4px;background:#f8f9fa;cursor:pointer;font-size:0.8rem">F24</button>
    </div>
    <div id="query-result"></div>
  </div>

  <!-- CSV Upload -->
  <div class="card">
    <h2>上傳檔案分析</h2>
    <p style="font-size:0.85rem;color:#555;margin-bottom:12px">上傳 CSV，系統將判斷每筆專利的 IPC class 是否有異動。</p>
    <div id="upload-area" style="border:2px dashed #ccc;border-radius:10px;padding:24px;text-align:center;cursor:pointer"
         ondragover="event.preventDefault();this.style.borderColor='#3498db'"
         ondragleave="this.style.borderColor='#ccc'"
         ondrop="event.preventDefault();this.style.borderColor='#ccc';handleUpload(event.dataTransfer.files[0])"
         onclick="document.getElementById('file-input').click()">
      <div style="font-size:1.2rem;margin-bottom:4px">📂 拖入 CSV 或點擊選取</div>
      <input type="file" id="file-input" accept=".csv,.tsv,.txt" style="display:none" onchange="handleUpload(this.files[0])">
    </div>
    <div id="upload-status" style="display:none;margin-top:8px"></div>
    <div id="upload-result" style="display:none;margin-top:8px"></div>
  </div>

  <div class="card">
    <h2>全部 Class 一覽</h2>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;align-items:center">
      <button onclick="filterAll('all')" class="filter-btn active" style="border-color:#3498db;color:#3498db" id="fb-all">全部</button>
      <button onclick="filterAll('A')" class="filter-btn" style="border-color:#3498db;color:#3498db" id="fb-A">A</button>
      <button onclick="filterAll('B')" class="filter-btn" style="border-color:#3498db;color:#3498db" id="fb-B">B</button>
      <button onclick="filterAll('C')" class="filter-btn" style="border-color:#3498db;color:#3498db" id="fb-C">C</button>
      <button onclick="filterAll('D')" class="filter-btn" style="border-color:#3498db;color:#3498db" id="fb-D">D</button>
      <button onclick="filterAll('E')" class="filter-btn" style="border-color:#3498db;color:#3498db" id="fb-E">E</button>
      <button onclick="filterAll('F')" class="filter-btn" style="border-color:#3498db;color:#3498db" id="fb-F">F</button>
      <button onclick="filterAll('G')" class="filter-btn" style="border-color:#3498db;color:#3498db" id="fb-G">G</button>
      <button onclick="filterAll('H')" class="filter-btn" style="border-color:#3498db;color:#3498db" id="fb-H">H</button>
      <span style="color:#ccc">│</span>
      <button onclick="toggleChangedOnly()" class="filter-btn" style="border-color:#e91e63;color:#e91e63" id="fb-changed">僅異動</button>
      <span id="table-count" style="font-size:0.78rem;color:#888;margin-left:8px"></span>
    </div>
    <div class="scroll-box">
      <table class="sample-table">
        <thead><tr><th>Class</th><th>說明</th><th>狀態</th><th>涉及版本</th><th>異動數</th></tr></thead>
        <tbody id="class-tbody"></tbody>
      </table>
    </div>
  </div>

  <p style="text-align:center;color:#999;font-size:0.78rem;margin-top:20px">
    資料來源：WIPO IPC Concordance（IPC v6 → 2026.01）｜ 更新日期：2026-04-06
  </p>
</div>

// Stats
const total = CLASS_DATA.length;
const changed = CLASS_DATA.filter(c => c.a === 'has_changes').length;
document.getElementById('n-total').textContent = total;
document.getElementById('n-changed').textContent = changed;
document.getElementById('n-unchanged').textContent = total - changed;

// Table
let _section = 'all';
let _changedOnly = false;

function filterAll(sec) {
  _section = sec;
  ['all','A','B','C','D','E','F','G','H'].forEach(s => {
    const btn = document.getElementById('fb-' + s);
    if (btn) { if (s === sec) { btn.classList.add('active'); btn.style.background = btn.style.borderColor; } else { btn.classList.remove('active'); btn.style.background = '#fff'; } }
  });
  renderTable();
}
function toggleChangedOnly() {
  _changedOnly = !_changedOnly;
  const btn = document.getElementById('fb-changed');
  if (_changedOnly) { btn.classList.add('active'); btn.style.background = btn.style.borderColor; }
  else { btn.classList.remove('active'); btn.style.background = '#fff'; }
  renderTable();
}
function renderTable() {
  let data = CLASS_DATA;
  if (_section !== 'all') data = data.filter(c => c.c.startsWith(_section));
  if (_changedOnly) data = data.filter(c => c.a === 'has_changes');
  // Sort: changed first
  data.sort((a, b) => (a.a === 'has_changes' ? 0 : 1) - (b.a === 'has_changes' ? 0 : 1) || a.c.localeCompare(b.c));
  const ch = data.filter(c => c.a === 'has_changes').length;
  document.getElementById('table-count').textContent = `${data.length} 個 class（${ch} 有異動）`;
  document.getElementById('class-tbody').innerHTML = data.map(c => {
    const badge = c.a === 'has_changes' ? '<span class="badge badge-change">有異動</span>' : '<span class="badge badge-ok">無異動</span>';
    const vers = c.v.map(v => `<span style="display:inline-block;background:#fff3e0;padding:1px 5px;border-radius:3px;font-size:0.7rem;margin:1px">${v}</span>`).join(' ');
    const depNote = c.dp.length > 0 ? `<div style="font-size:0.7rem;color:#c62828;margin-top:2px">含廢棄: ${c.dp.join(', ')}</div>` : '';
    return `<tr>
      <td><a href="./?ipc=${c.c}" style="font-weight:700;color:#2c3e50;text-decoration:none">${c.c}</a></td>
      <td style="font-size:0.78rem;color:#555">${c.d}${depNote}</td>
      <td>${badge}</td>
      <td style="font-size:0.75rem">${vers || '—'}</td>
      <td style="text-align:center">${c.n || '—'}</td>
    </tr>`;
  }).join('');
}
renderTable();

// Query
function tryEx(cls) { document.getElementById('cls-input').value = cls; tryQuery(); }
function tryQuery() {
  const cls = document.getElementById('cls-input').value.trim().toUpperCase().substring(0, 3);
  if (!cls) return;
  const c = CLASS_DATA.find(x => x.c === cls);
  const area = document.getElementById('query-result');
  if (!c) {
    area.innerHTML = `<div class="result-card unchanged"><strong>${cls}</strong> — 未找到此 class</div>`;
    return;
  }
  if (c.a === 'unchanged') {
    area.innerHTML = `<div class="result-card unchanged"><div style="font-weight:700;font-size:1rem">無異動</div><div style="color:#555">${cls} — ${c.d}</div><div style="font-size:0.85rem;color:#888;margin-top:4px">此 class 在所有 IPC 版本中均無異動。</div></div>`;
  } else {
    const vers = c.v.map(v => `<span style="display:inline-block;background:#fff;padding:2px 8px;border-radius:4px;border:1px solid #e0e0e0;font-size:0.82rem;margin:2px">${v}</span>`).join(' ');
    const depHtml = c.dp.length > 0 ? `<div style="margin-top:8px;font-size:0.85rem;color:#c62828">含廢棄 subclass: ${c.dp.join(', ')}</div>` : '';
    area.innerHTML = `<div class="result-card has_changes">
      <div style="font-weight:700;font-size:1rem;color:#e65100">有異動</div>
      <div style="color:#555;margin-bottom:8px">${cls} — ${c.d}</div>
      <div style="font-size:0.85rem;color:#555">涉及 ${c.v.length} 個版本轉換、${c.n} 筆 group 級異動</div>
      <div style="margin-top:6px">${vers}</div>
      ${depHtml}
      <a href="./?ipc=${cls}" style="display:inline-block;margin-top:8px;color:#3498db;font-size:0.85rem;text-decoration:none">在歷史查詢中查看 ${cls} 開頭的所有分類 →</a>
    </div>`;
  }
}
document.getElementById('cls-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryQuery(); });

// CSV Upload
function handleUpload(file) {
  if (!file) return;
  const status = document.getElementById('upload-status');
  status.style.display = 'block';
  status.innerHTML = '<div style="color:#3498db">讀取中...</div>';
  const reader = new FileReader();
  reader.onload = function(e) {
    const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { status.innerHTML = '<div style="color:#c62828">檔案為空</div>'; return; }
    const delim = file.name.endsWith('.tsv') ? '\t' : ',';
    const headers = lines[0].split(delim).map(h => h.replace(/"/g, '').trim());
    const ipcCandidates = headers.filter(h => /ipc|分類|class/i.test(h));
    const ipcIdx = ipcCandidates.length > 0 ? headers.indexOf(ipcCandidates[0]) : -1;
    if (ipcIdx === -1) {
      status.innerHTML = `<div>請選擇 IPC 欄位：</div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">${headers.map((h,i) => `<button onclick="runUpload(${i})" style="padding:3px 8px;border:1px solid #3498db;border-radius:4px;background:#fff;color:#3498db;cursor:pointer;font-size:0.82rem">${h}</button>`).join('')}</div>`;
      window._uploadLines = lines; window._uploadDelim = delim;
      return;
    }
    doUploadAnalysis(lines, delim, ipcIdx);
  };
  reader.readAsText(file, 'UTF-8');
}
function runUpload(idx) { doUploadAnalysis(window._uploadLines, window._uploadDelim, idx); }
function doUploadAnalysis(lines, delim, ipcIdx) {
  let unchanged = 0, changed = 0;
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(delim).map(c => c.replace(/^"|"$/g, '').trim());
    const ipc = (cols[ipcIdx] || '').toUpperCase();
    const clsMatch = ipc.match(/[A-H]\d{2}/);
    if (!clsMatch) continue;
    const cls = clsMatch[0];
    const c = CLASS_DATA.find(x => x.c === cls);
    const action = c && c.a === 'has_changes' ? 'has_changes' : 'unchanged';
    if (action === 'has_changes') changed++; else unchanged++;
    rows.push({ ipc, cls, action, desc: c ? c.d : '' });
  }
  const total = unchanged + changed;
  document.getElementById('upload-status').innerHTML = `<div style="color:#2e7d32;font-weight:600">✅ 分析完成：${total} 筆</div>`;
  const res = document.getElementById('upload-result');
  res.style.display = 'block';
  res.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0">
      <div style="text-align:center;padding:10px;border-radius:8px;background:#e8f5e9"><div style="font-size:1.3rem;font-weight:700;color:#2e7d32">${unchanged}</div><div style="font-size:0.72rem;color:#666">無異動 ${(unchanged/total*100).toFixed(1)}%</div></div>
      <div style="text-align:center;padding:10px;border-radius:8px;background:#fff3e0"><div style="font-size:1.3rem;font-weight:700;color:#e65100">${changed}</div><div style="font-size:0.72rem;color:#666">有異動 ${(changed/total*100).toFixed(1)}%</div></div>
    </div>`;
}
